name: Bug Report
description: Report a bug in mnemebrain-benchmark
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `pip show mnemebrain-benchmark | grep Version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - System Benchmark
        - BMB (Belief Maintenance Benchmark)
        - Embedding Benchmark
        - Task Evaluations
        - Adapter (specify in description)
        - Scoring / Metrics
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or commands to reproduce the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Paste any relevant error messages or tracebacks.
      render: text
